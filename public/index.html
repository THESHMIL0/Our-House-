<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Cat Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="top-bar">
        <div class="stats">Luna's Hunger: <span id="cat-hunger">0</span>/100</div>
    </div>

    <canvas id="gameCanvas" width="350" height="500"></canvas>

    <div id="edit-menu" class="hidden">
        <button id="btn-shrink">➖</button>
        <span id="size-label">Size</span>
        <button id="btn-grow">➕</button>
        <button id="btn-done">✅</button>
    </div>

    <div id="store-modal" class="hidden">
        <div class="store-content">
            <h3>Free Store 🏪</h3>
            <div class="store-grid">
                <button class="store-item">📺</button>
                <button class="store-item">🪑</button>
                <button class="store-item">💡</button>
                <button class="store-item">🧸</button>
                <button class="store-item">🖼️</button>
                <button class="store-item">🧶</button>
                <button class="store-item">📦</button>
                <button class="store-item">🪴</button>
            </div>
            <button id="close-store-btn">Close ❌</button>
        </div>
    </div>

    <div id="bottom-bar">
        <button id="feed-btn">Feed 🐟</button>
        <button id="store-btn">Store 🏪</button>
        <button>Us 💑</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
