<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Cat Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="top-bar">
        <div id="edit-tools" style="visibility: hidden;">
            <label>Size:</label>
            <input type="range" id="size-slider" min="0.5" max="3" step="0.1" value="1">
        </div>
        <div class="stats">Luna's Hunger: <span id="cat-hunger">0</span>/100</div>
    </div>

    <canvas id="gameCanvas" width="350" height="500"></canvas>

    <div id="bottom-bar">
        <button id="feed-btn">Feed 🐟</button>
        <button>Store 🏪</button>
        <button>Us 💑</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
